name: rnd4impact-vid-setup

x-gpu: &gpu
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

x-common: &common
  <<: *gpu
  image: rnd4impact-vid:cuda124
  build:
    context: ../..
    dockerfile: docker/vid_setup/Dockerfile
  shm_size: "4gb"
  ipc: host
  environment:
    HF_HOME: /root/.cache/huggingface
    HF_TOKEN: ${HF_TOKEN:-}
    HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-0}
    TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-0}
    PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
  volumes:
    - ../../data:/workspace/data
    - hf_cache:/root/.cache/huggingface

services:
  vid-setup:
    <<: *common
    command:
      - python
      - vid_setup/vid_setup_runner.py
      - --config
      - configs/vid_setup_svd_low_vram.yaml
      - --all

  shell:
    <<: *common
    profiles: ["tools"]
    stdin_open: true
    tty: true
    command: ["bash"]

volumes:
  hf_cache:
    name: rnd4impact_vid_hf_cache
