# ~6GB VRAM: SANA-Video 2B 480p with sequential CPU offload.
video_diffuser_config:
  type: sana
  model_path: Efficient-Large-Model/SANA-Video_2B_480p_diffusers
  variant: null
  device: cuda

quantization_config:
  torch_dtype: bfloat16
  enable_sequential_cpu_offload: true
  enable_model_cpu_offload: false
  enable_vae_slicing: true
  enable_vae_tiling: true
  enable_attention_slicing: true
  enable_xformers: false

generation_config:
  num_inference_steps: 25
  num_frames: 17
  width: 416
  height: 240
  frame_rate: 8
  guidance_scale: 6.0
  use_resolution_binning: true
  prompt: "cinematic motion, smooth natural movement, high quality"
  negative_prompt: "blurry, jittery, distorted, watermark, text, inconsistent motion"

io_config:
  script_path: data/
  input_subdir: refined_images
  image_template: "scene_{scene_number}_{prompt_number}.png"
  raw_videos_subdir: raw_videos
  refined_videos_subdir: refined_videos
  video_template: "scene_{scene_number}_{prompt_number}.mp4"
  save_raw: true
  skip_existing: true

upscale_config:
  enabled: false
  type: none
