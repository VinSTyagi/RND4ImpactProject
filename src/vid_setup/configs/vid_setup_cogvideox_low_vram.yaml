# ~6GB VRAM: CogVideoX 5B I2V with sequential offload (slow but fits tight budgets).
video_diffuser_config:
  type: cogvideox
  model_path: THUDM/CogVideoX-5b-I2V
  variant: null
  device: cuda

quantization_config:
  torch_dtype: float16
  enable_sequential_cpu_offload: true
  enable_model_cpu_offload: false
  enable_vae_slicing: true
  enable_vae_tiling: true
  enable_attention_slicing: true
  enable_xformers: false

generation_config:
  num_inference_steps: 30
  num_frames: 49
  width: 720
  height: 480
  frame_rate: 8
  guidance_scale: 6.0
  use_dynamic_cfg: false
  prompt: "cinematic motion, smooth natural movement, high quality"
  negative_prompt: "blurry, low quality, distorted, watermark, text, jittery"

io_config:
  script_path: data/
  input_subdir: raw_images
  image_template: "scene_{scene_number:02d}.png"
  raw_videos_subdir: raw_videos
  refined_videos_subdir: refined_videos
  video_template: "scene_{scene_number:02d}.mp4"
  save_raw: true
  skip_existing: true

upscale_config:
  enabled: false
  type: none
