# ~12GB VRAM: SVD with CPU offload at 1024×576.
video_diffuser_config:
  type: svd
  model_path: stabilityai/stable-video-diffusion-img2vid
  variant: fp16
  device: cuda

quantization_config:
  torch_dtype: float16
  enable_sequential_cpu_offload: true
  enable_model_cpu_offload: false
  enable_vae_slicing: true
  enable_vae_tiling: true
  enable_attention_slicing: true
  enable_xformers: false
  unet_enable_forward_chunking: true

generation_config:
  num_inference_steps: 25
  num_frames: 14
  width: 1024
  height: 576
  min_guidance_scale: 1.0
  max_guidance_scale: 1.0
  fps: 7
  motion_bucket_id: 127
  noise_aug_strength: 0.02
  decode_chunk_size: 1

io_config:
  script_path: data/
  input_subdir: raw_images
  image_template: "scene_{scene_number:02d}_{prompt_number}.png"
  raw_videos_subdir: raw_videos
  refined_videos_subdir: refined_videos
  video_template: "scene_{scene_number:02d}_{prompt_number}.mp4"
  save_raw: true
  skip_existing: true

upscale_config:
  enabled: false
  type: none
