# ~40GB VRAM (A100 40GB / L40): Wan 2.2 TI2V 5B at native 720p (1280×704), 81 frames.
# Model CPU offload + VAE tiling required on 40GB — full-GPU load OOMs during VAE decode.
video_diffuser_config:
  type: wan
  model_path: Wan-AI/Wan2.2-TI2V-5B-Diffusers
  variant: null
  device: cuda

quantization_config:
  torch_dtype: bfloat16
  enable_sequential_cpu_offload: false
  enable_model_cpu_offload: true
  enable_vae_slicing: true
  enable_vae_tiling: true
  enable_attention_slicing: true
  enable_xformers: false

generation_config:
  num_inference_steps: 50
  num_frames: 81
  width: 1280
  height: 704
  frame_rate: 24
  guidance_scale: 5.0
  prompt: "cinematic motion, smooth natural movement, high quality"
  negative_prompt: "worst quality, inconsistent motion, blurry, jittery, distorted, watermark, text"

io_config:
  script_path: data/
  input_subdir: raw_images
  image_template: "scene_{scene_number:02d}.png"
  raw_videos_subdir: raw_videos
  refined_videos_subdir: refined_videos
  video_template: "scene_{scene_number:02d}.mp4"
  save_raw: true
  skip_existing: true

upscale_config:
  enabled: false
  type: none
