# ~40GB VRAM: Wan 2.2 TI2V 5B at 1280×704 with CPU offload + VAE tiling.
video_diffuser_config:
  type: wan
  model_path: Wan-AI/Wan2.2-TI2V-5B-Diffusers
  variant: null
  device: cuda

quantization_config:
  torch_dtype: bfloat16
  enable_sequential_cpu_offload: false
  enable_model_cpu_offload: false
  enable_vae_slicing: true
  enable_vae_tiling: true
  enable_attention_slicing: true
  enable_xformers: false

generation_config:
  num_inference_steps: 45
  num_frames: 45
  width: 1024
  height: 576
  frame_rate: 24
  guidance_scale: 5.0

io_config:
  script_path: data/
  input_subdir: refined_images
  image_template: "scene_{scene_number:02d}_{prompt_number}.png"
  raw_videos_subdir: raw_videos
  refined_videos_subdir: refined_videos
  video_template: "scene_{scene_number:02d}_{prompt_number}.mp4"
  save_raw: true
  skip_existing: true

upscale_config:
  enabled: false
  type: none
