video_diffuser_config:
  type: ltx
  model_path: Lightricks/LTX-Video-0.9.7-distilled
  variant: null
  scheduler: euler
  pipeline_class: LTXConditionPipeline

quantization_config:
  torch_dtype: float16
  enable_model_cpu_offload: true
  enable_sequential_cpu_offload: true
  enable_vae_slicing: true
  enable_vae_tiling: true
  enable_attention_slicing: true
  enable_xformers: true

generation_config:
  num_inference_steps: 8
  default_guidance_scale: 1.0
  seed: null
  device: cuda
  num_frames: 97
  width: 704
  height: 480
  fps: 24
  decode_timestep: 0.05
  image_cond_noise_scale: 0.025

io_config:
  script_path: data/
  input_subdir: refined_images
  image_template: "scene_{scene_number:02d}.png"
  raw_videos_subdir: raw_videos
  refined_videos_subdir: refined_videos
  video_template: "scene_{scene_number:02d}.mp4"
  save_raw: true
  skip_existing: true

upscale_config:
  enabled: true
  type: ltx_latent
  model_path: Lightricks/ltxv-spatial-upscaler-0.9.7
  num_inference_steps: 5
  tone_map_compression_ratio: 0.6
