video_diffuser_config:
  type: animatediff
  model_path: SG161222/Realistic_Vision_V5.1_noVAE
  variant: fp16
  scheduler: ddim
  motion_adapter_path: guoyww/animatediff-motion-adapter-v1-5-2
  base_pipeline: sd15

quantization_config:
  torch_dtype: float16
  enable_model_cpu_offload: true
  enable_sequential_cpu_offload: false
  enable_vae_slicing: true
  enable_vae_tiling: false
  enable_attention_slicing: false
  enable_xformers: true

generation_config:
  num_inference_steps: 25
  default_guidance_scale: 7.5
  seed: null
  device: cuda
  num_frames: 16
  fps: 8
  animatediff_decode_chunk_size: 16

io_config:
  script_path: data/
  input_subdir: refined_images
  image_template: "scene_{scene_number:02d}.png"
  raw_videos_subdir: raw_videos
  refined_videos_subdir: refined_videos
  video_template: "scene_{scene_number:02d}.mp4"
  save_raw: true
  skip_existing: true

upscale_config:
  enabled: false
  type: none
