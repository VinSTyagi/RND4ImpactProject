# ~8GB+ VRAM: Wan 2.1 I2V 14B at 480p with aggressive sequential offload.
# Wan has no 1.3B image-to-video checkpoint; this is the smallest official I2V variant.
video_diffuser_config:
  type: wan
  model_path: Wan-AI/Wan2.1-I2V-14B-480P-Diffusers
  variant: null
  device: cuda

quantization_config:
  torch_dtype: bfloat16
  enable_sequential_cpu_offload: true
  enable_model_cpu_offload: false
  enable_vae_slicing: true
  enable_vae_tiling: true
  enable_attention_slicing: true
  enable_xformers: false

generation_config:
  num_inference_steps: 30
  num_frames: 17
  width: 432
  height: 240
  frame_rate: 8
  guidance_scale: 5.0
  prompt: "cinematic motion, smooth natural movement, high quality"
  negative_prompt: "worst quality, inconsistent motion, blurry, jittery, distorted, watermark, text"

io_config:
  script_path: data/
  input_subdir: refined_images
  image_template: "scene_{scene_number}_{prompt_number}.png"
  raw_videos_subdir: raw_videos
  refined_videos_subdir: refined_videos
  video_template: "scene_{scene_number}_{prompt_number}.mp4"
  save_raw: true
  skip_existing: true

upscale_config:
  enabled: false
  type: none
