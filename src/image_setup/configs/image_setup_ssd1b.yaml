# Distilled SDXL (~50% smaller UNet than full SDXL). Uses StableDiffusionXLPipeline.
# Middle ground: near-SDXL quality at ~6-8 GB VRAM.
pipeline_config:
  type: sdxl
  model_path: segmind/SSD-1B
  variant: null
  scheduler: euler

quantization_config:
  torch_dtype: float16
  enable_model_cpu_offload: false
  enable_sequential_cpu_offload: false
  enable_vae_slicing: true
  enable_vae_tiling: false
  enable_attention_slicing: false
  enable_xformers: true

generation_config:
  num_inference_steps: 25
  default_guidance_scale: 7.5
  seed: null
  device: cuda
  width: 1344
  height: 768

output_config:
  script_path: data/
  raw_subdir: raw_images
  output_subdir: refined_images
  filename_template: "scene_{scene_number}_{prompt_number}.png"
  save_raw: true
  skip_existing: true
