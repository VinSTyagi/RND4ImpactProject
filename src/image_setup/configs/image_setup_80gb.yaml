# ~80GB VRAM: SDXL on GPU at 1536×864.
pipeline_config:
  type: sdxl
  model_path: stabilityai/stable-diffusion-xl-base-1.0
  variant: fp16
  scheduler: euler

quantization_config:
  torch_dtype: float16
  enable_model_cpu_offload: false
  enable_sequential_cpu_offload: false
  enable_vae_slicing: false
  enable_vae_tiling: false
  enable_attention_slicing: false
  enable_xformers: true

generation_config:
  num_inference_steps: 50
  default_guidance_scale: 7.5
  seed: null
  device: cuda
  width: 1536
  height: 864

output_config:
  script_path: data/
  output_subdir: raw_images
  filename_template: "scene_{scene_number:02d}_{prompt_number}.png"
  skip_existing: true
