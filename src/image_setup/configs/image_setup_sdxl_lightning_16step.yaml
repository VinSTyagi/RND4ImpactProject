# SDXL base + ByteDance Lightning 8-step UNet. Uses StableDiffusionXLPipeline.
# Better quality than 4-step Lightning with still-fast generation.
pipeline_config:
  type: sdxl
  model_path: stabilityai/stable-diffusion-xl-base-1.0
  variant: fp16
  scheduler: default
  # unet_checkpoint_repo: ByteDance/SDXL-Lightning
  # unet_checkpoint_file: sdxl_lightning_16step_unet.safetensors

quantization_config:
  torch_dtype: float16
  enable_model_cpu_offload: true
  enable_sequential_cpu_offload: true
  enable_vae_slicing: true
  enable_vae_tiling: true
  enable_attention_slicing: true
  enable_xformers: true

generation_config:
  num_inference_steps: 16
  default_guidance_scale: 0.0
  seed: null
  device: cuda
  width: 1344
  height: 768

refinement_config:
  enabled: true
  type: sdxl_refiner
  model_path: stabilityai/stable-diffusion-xl-refiner-1.0
  variant: fp16
  scheduler: default
  num_inference_steps: 8
  denoising_start: 0.8
  denoising_end: 0.8
  strength: 0.35

output_config:
  script_path: data/
  raw_subdir: raw_images
  output_subdir: refined_images
  filename_template: "scene_{scene_number:02d}.png"
  save_raw: true
  skip_existing: true
