# SSD-1B with CPU offload and VAE tiling for tighter VRAM budgets.
pipeline_config:
  type: sdxl
  model_path: segmind/SSD-1B
  variant: null
  scheduler: euler

quantization_config:
  torch_dtype: float16
  enable_model_cpu_offload: true
  enable_sequential_cpu_offload: false
  enable_vae_slicing: true
  enable_vae_tiling: true
  enable_attention_slicing: true
  enable_xformers: false

generation_config:
  num_inference_steps: 25
  default_guidance_scale: 7.5
  seed: null
  device: cuda

refinement_config:
  enabled: true
  type: img2img
  model_path: segmind/SSD-1B
  variant: null
  scheduler: euler
  num_inference_steps: 12
  denoising_start: 0.8
  denoising_end: 0.8
  strength: 0.25

output_config:
  script_path: data/
  raw_subdir: raw_images
  output_subdir: refined_images
  filename_template: "scene_{scene_number:02d}.png"
  save_raw: true
  skip_existing: true
