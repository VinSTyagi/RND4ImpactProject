# High-quality SD 1.5 checkpoint. Uses StableDiffusionPipeline.
# Same VRAM footprint as vanilla SD 1.5 with stronger composition and aesthetics.
pipeline_config:
  type: sd15
  model_path: Lykon/dreamshaper-8
  variant: null
  scheduler: euler

quantization_config:
  torch_dtype: float16
  enable_model_cpu_offload: false
  enable_sequential_cpu_offload: false
  enable_vae_slicing: true
  enable_vae_tiling: false
  enable_attention_slicing: false
  enable_xformers: true

generation_config:
  num_inference_steps: 25
  default_guidance_scale: 7.5
  seed: null
  device: cuda
  width: 768
  height: 432

output_config:
  script_path: data/
  output_subdir: raw_images
  filename_template: "scene_{scene_number:02d}.png"
  skip_existing: true
