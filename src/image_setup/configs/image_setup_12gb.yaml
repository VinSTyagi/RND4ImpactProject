# ~12GB VRAM: SDXL with CPU offload at 1024×576.
pipeline_config:
  type: sdxl
  model_path: stabilityai/stable-diffusion-xl-base-1.0
  variant: fp16
  scheduler: euler

quantization_config:
  torch_dtype: float16
  enable_model_cpu_offload: true
  enable_sequential_cpu_offload: false
  enable_vae_slicing: true
  enable_vae_tiling: true
  enable_attention_slicing: true
  enable_xformers: false

generation_config:
  num_inference_steps: 30
  default_guidance_scale: 7.5
  seed: null
  device: cuda
  width: 1024
  height: 576

output_config:
  script_path: data/
  output_subdir: raw_images
  filename_template: "scene_{scene_number:02d}_{prompt_number}.png"
  skip_existing: true
