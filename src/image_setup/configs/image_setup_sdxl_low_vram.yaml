pipeline_config:
  type: sdxl
  model_path: stabilityai/stable-diffusion-xl-base-1.0
  variant: fp16
  scheduler: euler

quantization_config:
  torch_dtype: float16
  enable_model_cpu_offload: true
  enable_sequential_cpu_offload: false
  enable_vae_slicing: true
  enable_vae_tiling: true
  enable_attention_slicing: true
  enable_xformers: false

generation_config:
  num_inference_steps: 25
  default_guidance_scale: 7.5
  seed: 42
  device: cuda
  width: 1024
  height: 576

refinement_config:
  enabled: true
  type: img2img
  model_path: stabilityai/stable-diffusion-xl-base-1.0
  variant: fp16
  scheduler: euler
  num_inference_steps: 15
  denoising_start: 0.8
  denoising_end: 0.8
  strength: 0.3

output_config:
  script_path: data/
  raw_subdir: raw_images
  output_subdir: refined_images
  filename_template: "scene_{scene_number}_{prompt_number}.png"
  save_raw: true
  skip_existing: true
