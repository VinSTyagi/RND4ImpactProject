# ~6GB VRAM: ~1GB weights; extra headroom allows 4096 ctx KV (~0.25GB) comfortably.
vllm_model_config:
  model_path: Qwen/Qwen2.5-1.5B-Instruct-AWQ
  quantization: awq
  max_tokens: 1536
  temperature: 0.25
  max_model_len: 4096
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.80
  enforce_eager: true
  batch_size: 1

idea_config:
  num_ideas: 10
  prompt_path: script_setup/prompts/stage_1.md
  output_path: script_setup/output/stage_1.jsonl

title_config:
  prompt_path: script_setup/prompts/stage_2.md
  idea_path: script_setup/output/stage_1.jsonl
  output_path: script_setup/output/script/

scene_config:
  num_scenes: 8
  prompt_path: script_setup/prompts/stage_3.md
  script_path: script_setup/output/script/

image_config:
  prompt_path: script_setup/prompts/stage_4.md
  scene_path: script_setup/output/script/
  output_path: script_setup/output/images/
