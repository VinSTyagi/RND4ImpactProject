# ~80GB VRAM (NVIDIA A100): Qwen3-32B-AWQ ~21GB weights + KV @ 32K ctx.
# Largest dense Qwen3 AWQ that fits comfortably on a single A100 (avoid MoE AWQ / FP8 on Ampere).
global_vllm_config:
  model_path: Qwen/Qwen3-32B-AWQ
  quantization: awq
  max_tokens: 16384
  temperature: 0.3
  top_p: 0.95
  top_k: 20
  min_p: 0
  max_model_len: 32768
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.92
  enforce_eager: false
  enable_thinking: true
  max_num_seqs: 16
  max_num_batched_tokens: 32768

idea_config:
  num_ideas: 3
  prompt_path: script_setup/prompts/stage_1.md
  output_path: data/

title_config:
  num_words: 7
  prompt_path: script_setup/prompts/stage_2.md
  script_path: data/

scene_config:
  num_scenes: 12
  prompt_path: script_setup/prompts/stage_3.md
  script_path: data/

image_config:
  prompt_path: script_setup/prompts/stage_4.md
  script_path: data/
