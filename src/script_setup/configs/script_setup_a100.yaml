# ~80GB VRAM (NVIDIA A100): Qwen3-14B bf16 ~28GB weights + ~45GB KV @ 32K ctx.
global_vllm_config:
  model_path: Qwen/Qwen3-14B
  quantization: none
  max_tokens: 16384
  temperature: 0.3
  top_p: 0.95
  top_k: 20
  min_p: 0
  max_model_len: 32768
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.95
  enforce_eager: false
  enable_thinking: true
  max_num_seqs: 32
  max_num_batched_tokens: 65536

idea_config:
  num_ideas: 10
  prompt_path: script_setup/prompts/stage_1.md
  output_path: data/

title_config:
  num_words: 7
  prompt_path: script_setup/prompts/stage_2.md
  script_path: data/

scene_config:
  num_scenes: 10
  prompt_path: script_setup/prompts/stage_3.md
  script_path: data/

image_config:
  prompt_path: script_setup/prompts/stage_4.md
  script_path: data/
