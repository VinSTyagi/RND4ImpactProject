# ~6GB VRAM: Phi-4-mini AWQ, short context, sequential batching.
global_vllm_config:
  model_path: Sumo10/Phi-4-mini-instruct-AWQ-4bit
  quantization: awq_marlin
  max_tokens: 4096
  temperature: 0.25
  max_model_len: 4096
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.80
  enforce_eager: false
  enable_thinking: true
  max_num_seqs: 1
  max_num_batched_tokens: 4096

idea_config:
  num_ideas: 1
  prompt_path: script_setup/prompts/stage_1.md
  output_path: data/
  batch_size: 0

title_config:
  num_words: 5
  prompt_path: script_setup/prompts/stage_2.md
  script_path: data/
  batch_size: 1

scene_config:
  num_scenes: 5
  prompt_path: script_setup/prompts/stage_3.md
  script_path: data/
  batch_size: 1

scene_content_config:
  min_beats: 8
  max_beats: 15
  prompt_path: script_setup/prompts/stage_4.md
  script_path: data/
  batch_size: 1

image_config:
  min_prompts: 1
  max_prompts: 3
  prompt_path: script_setup/prompts/stage_5.md
  script_path: data/
  batch_size: 1
