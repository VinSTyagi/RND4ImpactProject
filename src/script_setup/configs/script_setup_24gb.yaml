# ~24GB VRAM: Qwen3-8B-AWQ, larger context and light batching.
global_vllm_config:
  model_path: Qwen/Qwen3-8B-AWQ
  quantization: awq
  dtype: auto
  max_tokens: 8192
  temperature: 0.5
  top_p: 0.95
  top_k: 20
  min_p: 0
  max_model_len: 16384
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.85
  enforce_eager: false
  enable_thinking: true
  max_num_seqs: 4
  max_num_batched_tokens: 16384

idea_config:
  num_ideas: 1
  prompt_path: script_setup/prompts/stage_1.md
  output_path: data/
  batch_size: 0

title_config:
  num_words: 7
  prompt_path: script_setup/prompts/stage_2.md
  script_path: data/
  batch_size: 1

scene_config:
  num_scenes: 7
  prompt_path: script_setup/prompts/stage_3.md
  script_path: data/
  batch_size: 1

scene_content_config:
  min_beats: 12
  max_beats: 25
  prompt_path: script_setup/prompts/stage_4.md
  script_path: data/
  batch_size: 2

image_config:
  min_prompts: 1
  max_prompts: 5
  prompt_path: script_setup/prompts/stage_5.md
  script_path: data/
  batch_size: 2
