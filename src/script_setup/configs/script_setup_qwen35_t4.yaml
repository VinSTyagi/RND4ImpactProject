# ~16GB VRAM (NVIDIA T4): Qwen3.5-4B-AWQ ~3GB weights + KV @ 16K ctx.
# Requires: uv sync --package rnd4impact-script-setup --extra qwen35
global_vllm_config:
  model_path: QuantTrio/Qwen3.5-4B-AWQ
  quantization: awq
  max_tokens: 12288
  temperature: 0.3
  top_p: 0.95
  top_k: 20
  min_p: 0
  max_model_len: 16384
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.90
  enforce_eager: false
  enable_thinking: true
  language_model_only: true
  max_num_seqs: 4
  max_num_batched_tokens: 16384

idea_config:
  num_ideas: 5
  prompt_path: script_setup/prompts/stage_1.md
  output_path: data/

title_config:
  num_words: 5
  prompt_path: script_setup/prompts/stage_2.md
  script_path: data/

scene_config:
  num_scenes: 7
  prompt_path: script_setup/prompts/stage_3.md
  script_path: data/

image_config:
  prompt_path: script_setup/prompts/stage_4.md
  script_path: data/
