# ~6GB VRAM: ~1GB weights + ~0.9GB KV @ 32768 ctx; only 2 KV heads makes cache tiny. Gen limit: 8K.
global_vllm_config:
  model_path: Qwen/Qwen2.5-1.5B-Instruct-AWQ
  quantization: awq_marlin
  max_tokens: 8192
  temperature: 0.25
  max_model_len: 32768
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.80
  enforce_eager: true
  enable_thinking: true
  max_num_seqs: 4
  max_num_batched_tokens: 8192

idea_config:
  num_ideas: 10
  prompt_path: script_setup/prompts/stage_1.md
  output_path: data/
  batch_size: 0

title_config:
  num_words: 7
  prompt_path: script_setup/prompts/stage_2.md
  script_path: data/
  batch_size: 0

scene_outline_config:
  num_scenes: 5
  prompt_path: script_setup/prompts/stage_3.md
  script_path: data/
  batch_size: 1

scene_content_config:
  min_beats: 18
  max_beats: 40
  prompt_path: script_setup/prompts/stage_4.md
  script_path: data/
  batch_size: 1

image_config:
  min_prompts: 1
  max_prompts: 5
  prompt_path: script_setup/prompts/stage_5.md
  script_path: data/
  batch_size: 0
  output_path: data/

video_config:
  script_path: data/
