# ~40GB VRAM (NVIDIA A100 40GB / L40): Qwen3-30B-A3B-AWQ MoE (~3.3B active) + KV @ 40K ctx.
# MoE AWQ requires awq_marlin in vLLM 0.8.x (plain awq has no FusedMoE quant path).
global_vllm_config:
  model_path: surogate/Qwen3-30B-A3B-AWQ
  quantization: awq_marlin
  max_tokens: 32768
  temperature: 0.5
  top_p: 0.95
  top_k: 20
  min_p: 0
  max_model_len: 40960
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.88
  enforce_eager: false
  enable_thinking: true
  max_num_seqs: 1
  max_num_batched_tokens: 40960

idea_config:
  num_ideas: 1
  prompt_path: script_setup/prompts/stage_1.md
  output_path: data/

title_config:
  num_words: 7
  prompt_path: script_setup/prompts/stage_2.md
  script_path: data/

scene_config:
  num_scenes: 5
  prompt_path: script_setup/prompts/stage_3.md
  script_path: data/

image_config:
  prompt_path: script_setup/prompts/stage_4.md
  script_path: data/
