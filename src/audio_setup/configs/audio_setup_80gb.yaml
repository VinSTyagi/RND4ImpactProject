# ~80GB VRAM: Qwen3-TTS with maximum batch concurrency on datacenter GPUs.
tts_model_config:
  model_name: "Qwen/Qwen3-TTS-12Hz-1.7B-VoiceDesign"
  model_family: "Qwen"
  dtype: "bfloat16"
  device: "cuda"
  quantization: none
  max_model_len: 2048
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.90
  enforce_eager: false
  max_num_seqs: 8
  max_num_batched_tokens: 16384

io_config:
  input_subdir: "data/"
  output_subdir: "audio/"
  audio_template: "scene_{scene_number:02d}_{line_index:02d}.wav"
  save_raw: true
  skip_existing: true
