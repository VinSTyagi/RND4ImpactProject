# ~6GB VRAM: 1.7B VoiceDesign with conservative GPU memory settings.
tts_model_config:
  model_name: "Qwen/Qwen3-TTS-12Hz-1.7B-VoiceDesign"
  model_family: "Qwen"
  dtype: "float16"
  device: "cuda"
  quantization: none
  max_model_len: 1024
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.40
  enforce_eager: true
  max_num_seqs: 1
  max_num_batched_tokens: 2048

io_config:
  input_subdir: "data/"
  output_subdir: "audio/"
  audio_template: "scene_{scene_number:02d}_{line_index:02d}.wav"
  save_raw: true
  skip_existing: true
